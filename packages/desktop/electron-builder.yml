appId: tech.swarmx.desktop
productName: SwarmX
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
  - LICENSE
  - THIRD_PARTY_NOTICES.md
  - third_party_licenses/**/*
asarUnpack:
  - node_modules/node-pty/**/*
extraResources:
  - from: build/icon.png
    to: icon.png
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - dir
